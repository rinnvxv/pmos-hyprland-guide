# ============================================================
#  hyprland.conf — postmarketOS mobile
# ============================================================

monitor = DSI-1, preferred, auto, 2.5

# ──────────────────────────────────────────────────────────
# Rendering
# ──────────────────────────────────────────────────────────
render {
    direct_scanout = false
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_guiutils_check = true
}

# ──────────────────────────────────────────────────────────
# Environment variables
# ──────────────────────────────────────────────────────────
env = GSK_RENDERER, ngl
env = GTK_USE_PORTAL, 1
env = MOZ_ENABLE_WAYLAND, 1
env = QT_QPA_SYSTEM_ICON_THEME, breeze
env = XCURSOR_SIZE, 24

# ──────────────────────────────────────────────────────────
# App / command variables
# ──────────────────────────────────────────────────────────
$terminal    = alacritty
$fileManager = nautilus
$dmenu       = bemenu --scrollbar autohide -s -n -w -c -l12 -M 40 -H 20
$menu        = fuzzel
$keyboard    = wvkbd-mobintl
$keyboard_args = -l simple,specialpad -H 200 -O --bg 22222288
$lock        = swaylock --grace 100000 --indicator --clock --datestr "%Y-%m-%d" --screenshots --effect-blur 10x10

# ──────────────────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────────────────
exec-once = /usr/libexec/pipewire-launcher
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/libexec/xdg-desktop-portal-hyprland
exec-once = /usr/libexec/xdg-desktop-portal
exec-once = swaybg -i ~/Pictures/background.jpg -m fill || swaybg -c 1a1a2e
exec-once = sleep 2 && waybar
exec-once = swaync
exec-once = switch.sh
exec-once = $terminal -e sh -c "neofetch; exec fish"
exec-once = $keyboard $keyboard_args

# ──────────────────────────────────────────────────────────
# Input
# ──────────────────────────────────────────────────────────
input {
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = yes
    }
}

# ──────────────────────────────────────────────────────────
# Layout
# ──────────────────────────────────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    allow_tearing    = false
    resize_on_border = true
}

# ──────────────────────────────────────────────────────────
# Decoration
# ──────────────────────────────────────────────────────────
decoration {
    rounding = 20

    blur {
        enabled = true
        size    = 3
        passes  = 1
    }
}

# ──────────────────────────────────────────────────────────
# Animations
# ──────────────────────────────────────────────────────────
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,     1, 7, myBezier
    animation = windowsOut,  1, 7, default, popin 80%
    animation = border,      1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade,        1, 7, default
    animation = workspaces,  1, 6, default
}

# ──────────────────────────────────────────────────────────
# Layout engines
# ──────────────────────────────────────────────────────────
dwindle {
    pseudotile     = yes
    preserve_split = yes
}

master {
}

# ──────────────────────────────────────────────────────────
# Touch gestures
# ──────────────────────────────────────────────────────────
gestures {
    workspace_swipe_cancel_ratio       = 0.5
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_touch              = on
    workspace_swipe_invert             = off
    workspace_swipe_forever            = on
    workspace_swipe_use_r              = true
}

# ──────────────────────────────────────────────────────────
# Layer rules
# ──────────────────────────────────────────────────────────
layerrule = blur, syslock

layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window

layerrule = abovelock, wvkbd
layerrule = noanim, wvkbd

# ──────────────────────────────────────────────────────────
# Keybinds
# ──────────────────────────────────────────────────────────
$mainMod = SUPER

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, D,      exec, $menu
bind = $mainMod, W,      exec, firefox-esr

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Brightness
binde = $mainMod SHIFT, up,   exec, brightnessctl set +5%
binde = $mainMod SHIFT, down, exec, brightnessctl set 5%-

# Volume
bind = $mainMod CTRL, up,   exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = $mainMod CTRL, down, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%

# Screenshots (3s delay)
bind = $mainMod CTRL, 1, exec, sleep 3 && grim "$HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png"
bind = $mainMod CTRL, 2, exec, sleep 3 && grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" "$HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png"

# Toggle fullscreen-like layout (gaps_out 0 <-> 10)
bind = $mainMod, F, exec, hyprctl keyword general:gaps_out $(hyprctl -j getoption general:gaps_out 10 | jq 'if .int == 10 then 0 else 10 end')

# ──────────────────────────────────────────────────────────
# Hardware buttons
# ──────────────────────────────────────────────────────────

# Volume up -> open terminal
bindi = , XF86AudioRaiseVolume, exec, $terminal

# Volume down -> toggle virtual keyboard
bindli = , XF86AudioLowerVolume, exec, pkill -SIGRTMIN -f wvkbd-mobintl
bindli = , XF86AudioLowerVolume, execr, pgrep $keyboard || $keyboard $keyboard_args

# Power button -> toggle display on/off and touch input
bindli = , XF86PowerOff, exec, hyprctl dispatch dpms $(hyprctl -j monitors | jq -r 'first|.dpmsStatus|if . then "off" else "on" end')
bindli = , XF86PowerOff, exec, hyprctl keyword input:touchdevice:enabled $(hyprctl -j getoption input:touchdevice:enabled | jq '.int==0')
